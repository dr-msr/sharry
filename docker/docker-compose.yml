version: '3.7'
services:
  config-init:
    image: busybox
    container_name: sharry_config_init
    volumes:
      - sharry_config:/config
    command:
      - sh
      - -c
      - |
        printf 'sharry.restserver {\n  base-url = "http://localhost:9090"\n  bind {\n    address = "0.0.0.0"\n    port = 9090\n  }\n  backend {\n    auth {\n      fixed.enabled = true\n    }\n    jdbc {\n      url = "jdbc:postgresql://db:5432/dbname"\n      user = "dbuser"\n      password = "dbpass"\n    }\n    signup {\n      mode = "open"\n      invite-time = "14 days"\n      invite-password = "generate-invite"\n    }\n  }\n}\n' > /config/sharry.conf && echo "Config written" && cat /config/sharry.conf
    restart: "no"

  restserver:
    image: eikek0/sharry:latest
    container_name: sharry
    command: /config/sharry.conf
    ports:
      - "9090:9090"
    volumes:
      - sharry_config:/config
    depends_on:
      config-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:9090/api/v2/open/info/version"]
      interval: 1m
      timeout: 10m
      retries: 2
      start_period: 30s

  db:
    image: postgres:18.3
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=dbpass
      - POSTGRES_DB=dbname
      - PGUSER=dbuser
    healthcheck:
      test: pg_isready -q -d dbname
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  sharry_config:
